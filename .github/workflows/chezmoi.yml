name: chezmoi

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  GITHUB_TOKEN: ${{ github.token }}
  HOMEBREW_NO_ANALYTICS: "1"
  HOMEBREW_NO_ENV_HINTS: "1"
  HOMEBREW_NO_INSTALL_CLEANUP: "1"

jobs:
  bootstrap:
    name: Bootstrap macOS
    runs-on: macos-26
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install chezmoi
        run: brew install chezmoi

      - name: Test utilities
        run: bash tests/rsync_parallel.sh

      - name: Configure mise
        shell: bash
        run: |
          prefix="$RUNNER_TEMP/mise-homebrew"
          echo "MISE_SYSTEM_BREW_PREFIX=$prefix" >> "$GITHUB_ENV"
          echo "$prefix/bin" >> "$GITHUB_PATH"
          echo "$prefix/sbin" >> "$GITHUB_PATH"

      - name: Apply chezmoi
        shell: bash
        run: |
          set -euo pipefail

          home="$RUNNER_TEMP/home"
          cache="$RUNNER_TEMP/chezmoi-cache"
          config="$RUNNER_TEMP/chezmoi.toml"
          state="$RUNNER_TEMP/chezmoi-state/chezmoistate.boltdb"

          mkdir -p "$home" "$cache" "$(dirname "$state")"
          export HOME="$home"
          : > "$config"

          chezmoi \
            --source "$GITHUB_WORKSPACE/chezmoi" \
            --destination "$home" \
            --cache "$cache" \
            --config "$config" \
            --persistent-state "$state" \
            --no-tty \
            --force \
            --refresh-externals=never \
            apply --exclude=scripts

          chezmoi \
            --source "$GITHUB_WORKSPACE/chezmoi" \
            --destination "$home" \
            --cache "$cache" \
            --config "$config" \
            --persistent-state "$state" \
            --no-tty \
            --force \
            --refresh-externals=never \
            apply --include=scripts --verbose

      - name: Verify symlinks
        shell: bash
        run: |
          set -euo pipefail

          home="$RUNNER_TEMP/home"

          while IFS= read -r -d '' link; do
            target=$(/usr/bin/readlink "$link")
            if [[ "$target" = /* ]]; then
              resolved="$target"
            else
              resolved="$(/usr/bin/dirname "$link")/$target"
            fi

            if [[ ! -e "$resolved" ]]; then
              echo "Broken symlink: $link -> $target" >&2
              exit 1
            fi
          done < <(/usr/bin/find "$home" -type l -print0)

      - name: Verify chezmoi
        shell: bash
        run: |
          set -euo pipefail

          home="$RUNNER_TEMP/home"
          cache="$RUNNER_TEMP/chezmoi-cache"
          config="$RUNNER_TEMP/chezmoi.toml"
          state="$RUNNER_TEMP/chezmoi-state/chezmoistate.boltdb"

          export HOME="$home"

          chezmoi \
            --source "$GITHUB_WORKSPACE/chezmoi" \
            --destination "$home" \
            --cache "$cache" \
            --config "$config" \
            --persistent-state "$state" \
            --no-tty \
            --refresh-externals=never \
            verify --exclude=scripts

          test -x "$home/.local/bin/mise"
          mise="$home/.local/bin/mise"
          "$mise" --version
          MISE_SYSTEM_PACKAGES_MANAGERS=brew "$mise" bootstrap packages status --missing
          "$mise" install --dry-run-code --locked
