name: chezmoi

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  GITHUB_TOKEN: ${{ github.token }}
  PATH: /usr/bin:/bin:/usr/sbin:/sbin

jobs:
  bootstrap:
    name: Bootstrap macOS
    runs-on: macos-26
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Remove Homebrew
        shell: bash
        run: |
          sudo /bin/mv /opt/homebrew /opt/homebrew-disabled

          if [[ -e /opt/homebrew ]]; then
            exit 1
          fi

          if command -v brew >/dev/null 2>&1; then
            exit 1
          fi

      - name: Install chezmoi
        shell: bash
        run: |
          bin="$RUNNER_TEMP/bin"
          mkdir -p "$bin"
          /bin/sh -c "$(/usr/bin/curl -fsLS https://get.chezmoi.io)" -- -b "$bin"
          echo "$bin" >> "$GITHUB_PATH"

      - name: Apply chezmoi
        shell: bash
        run: |
          set -euo pipefail

          home="$RUNNER_TEMP/home"
          cache="$RUNNER_TEMP/chezmoi-cache"
          config="$RUNNER_TEMP/chezmoi.toml"
          state="$RUNNER_TEMP/chezmoi-state/chezmoistate.boltdb"

          mkdir -p "$home" "$cache" "$(dirname "$state")"
          export HOME="$home"
          : > "$config"

          chezmoi \
            --source "$GITHUB_WORKSPACE/chezmoi" \
            --destination "$home" \
            --cache "$cache" \
            --config "$config" \
            --persistent-state "$state" \
            --no-tty \
            --force \
            --refresh-externals=never \
            apply --exclude=scripts

          chezmoi \
            --source "$GITHUB_WORKSPACE/chezmoi" \
            --destination "$home" \
            --cache "$cache" \
            --config "$config" \
            --persistent-state "$state" \
            --no-tty \
            --force \
            --refresh-externals=never \
            apply --include=scripts --verbose

      - name: Verify symlinks
        shell: bash
        run: |
          set -euo pipefail

          home="$RUNNER_TEMP/home"

          while IFS= read -r -d '' link; do
            target=$(/usr/bin/readlink "$link")
            if [[ "$target" = /* ]]; then
              resolved="$target"
            else
              resolved="$(/usr/bin/dirname "$link")/$target"
            fi

            if [[ ! -e "$resolved" ]]; then
              echo "Broken symlink: $link -> $target" >&2
              exit 1
            fi
          done < <(/usr/bin/find "$home" -type l -print0)

      - name: Verify chezmoi
        shell: bash
        run: |
          set -euo pipefail

          home="$RUNNER_TEMP/home"
          cache="$RUNNER_TEMP/chezmoi-cache"
          config="$RUNNER_TEMP/chezmoi.toml"
          state="$RUNNER_TEMP/chezmoi-state/chezmoistate.boltdb"

          export HOME="$home"

          chezmoi \
            --source "$GITHUB_WORKSPACE/chezmoi" \
            --destination "$home" \
            --cache "$cache" \
            --config "$config" \
            --persistent-state "$state" \
            --no-tty \
            --refresh-externals=never \
            verify --exclude=scripts

          test -x "$home/.local/bin/mise"
          mise="$home/.local/bin/mise"
          "$mise" --version
          MISE_SYSTEM_PACKAGES_MANAGERS=brew "$mise" bootstrap packages status --missing
          "$mise" install --dry-run-code --locked

          if command -v brew >/dev/null 2>&1; then
            exit 1
          fi
