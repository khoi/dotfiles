name: chezmoi

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  GITHUB_TOKEN: ${{ github.token }}
  HOMEBREW_NO_ANALYTICS: "1"
  HOMEBREW_NO_ENV_HINTS: "1"
  HOMEBREW_NO_INSTALL_CLEANUP: "1"

jobs:
  bootstrap:
    name: Bootstrap macOS
    runs-on: macos-15
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install chezmoi
        run: brew install chezmoi

      - name: Apply chezmoi
        shell: bash
        run: |
          set -euo pipefail

          home="$RUNNER_TEMP/home"
          cache="$RUNNER_TEMP/chezmoi-cache"
          config="$RUNNER_TEMP/chezmoi.toml"
          generated_config="$RUNNER_TEMP/chezmoi.generated.toml"
          state="$RUNNER_TEMP/chezmoi-state/chezmoistate.boltdb"

          mkdir -p "$home" "$cache" "$(dirname "$state")"
          export HOME="$home"
          : > "$config"

          chezmoi \
            --source "$GITHUB_WORKSPACE/chezmoi" \
            --destination "$home" \
            --cache "$cache" \
            --config "$config" \
            --no-tty \
            --refresh-externals=never \
            execute-template --init --file "$GITHUB_WORKSPACE/chezmoi/.chezmoi.toml.tmpl" > "$generated_config"
          mv "$generated_config" "$config"

          chezmoi \
            --source "$GITHUB_WORKSPACE/chezmoi" \
            --destination "$home" \
            --cache "$cache" \
            --config "$config" \
            --persistent-state "$state" \
            --no-tty \
            --force \
            --refresh-externals=always \
            apply --exclude=scripts

          chezmoi \
            --source "$GITHUB_WORKSPACE/chezmoi" \
            --destination "$home" \
            --cache "$cache" \
            --config "$config" \
            --persistent-state "$state" \
            --no-tty \
            --force \
            --refresh-externals=never \
            apply --include=scripts --verbose

      - name: Verify chezmoi
        shell: bash
        run: |
          set -euo pipefail

          home="$RUNNER_TEMP/home"
          cache="$RUNNER_TEMP/chezmoi-cache"
          config="$RUNNER_TEMP/chezmoi.toml"
          state="$RUNNER_TEMP/chezmoi-state/chezmoistate.boltdb"

          export HOME="$home"

          chezmoi \
            --source "$GITHUB_WORKSPACE/chezmoi" \
            --destination "$home" \
            --cache "$cache" \
            --config "$config" \
            --persistent-state "$state" \
            --no-tty \
            --refresh-externals=never \
            verify --exclude=scripts

          brew bundle check --file="$home/.Brewfile"
          test -x "$home/.local/bin/mise"
          "$home/.local/bin/mise" --version
