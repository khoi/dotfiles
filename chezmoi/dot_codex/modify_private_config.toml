{{- /* chezmoi:modify-template */ -}}
{{- $config := dict -}}
{{- if .chezmoi.stdin -}}{{- $config = fromToml .chezmoi.stdin -}}{{- end -}}
{{- $managed := fromToml `
approval_policy = "never"
model = "gpt-5.6-sol"
model_reasoning_effort = "xhigh"
model_reasoning_summary = "concise"
model_verbosity = "low"
personality = "pragmatic"
sandbox_mode = "danger-full-access"
plan_mode_reasoning_effort = "ultra"
suppress_unstable_features_warning = true
approvals_reviewer = "user"
service_tier = "default"
"tui.status_line" = ["context-used", "model-with-reasoning", "context-window-size", "pull-request-number", "branch-changes"]
"tui.terminal_title" = ["git-branch", "run-state", "task-progress"]
"tui.status_line_use_colors" = true
"tui.session_picker_view" = "dense"
"tui.pet" = "disabled"
"tui.show_tooltips" = true

[agents]
max_concurrent_threads_per_session = 8

[analytics]
enabled = false

[feedback]
enabled = false

[features]
goals = true
apps = true
prevent_idle_sleep = true
default_mode_request_user_input = true
unified_exec = true
shell_snapshot = true
multi_agent_v2 = true
memories = true
hooks = true

` -}}
{{- $managed = setValueAtPath "notify" (list (printf "%s/.codex/computer-use/Codex Computer Use.app/Contents/SharedSupport/SkyComputerUseClient.app/Contents/MacOS/SkyComputerUseClient" .chezmoi.homeDir) "turn-ended") $managed -}}
{{- $removed := list "agents.max_threads" "features.external_migration" "features.ghost_commit" "features.js_repl" "features.multi_agent" "features.remote_plugin" "features.responses_websockets_v2" "features.rmcp_client" "features.skills" "features.steer" "features.terminal_resize_reflow" -}}
{{- range $removed -}}{{- $config = deleteValueAtPath . $config -}}{{- end -}}
{{- range $key, $value := $managed -}}{{- $config = setValueAtPath $key $value $config -}}{{- end -}}
{{- toToml $config -}}
