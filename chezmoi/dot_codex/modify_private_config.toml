{{- /* chezmoi:modify-template */ -}}
{{- $config := dict -}}
{{- if .chezmoi.stdin -}}{{- $config = fromToml .chezmoi.stdin -}}{{- end -}}
{{- $managed := fromToml `
approval_policy = "never"
model = "gpt-5.5"
model_reasoning_effort = "xhigh"
model_verbosity = "low"
personality = "pragmatic"
sandbox_mode = "danger-full-access"
plan_mode_reasoning_effort = "xhigh"
suppress_unstable_features_warning = true
approvals_reviewer = "user"
service_tier = "default"
"tui.status_line" = ["context-used", "model-with-reasoning", "context-window-size", "pull-request-number", "branch-changes"]
"tui.terminal_title" = ["git-branch", "run-state", "task-progress"]
"tui.status_line_use_colors" = true
"tui.session_picker_view" = "dense"
"tui.pet" = "disabled"

[agents]
max_threads = 8

[analytics]
enabled = false

[feedback]
enabled = false

[features]
goals = true
apps = false
prevent_idle_sleep = true
default_mode_request_user_input = true
ghost_commit = false
unified_exec = true
skills = true
shell_snapshot = true
steer = true
responses_websockets_v2 = true
multi_agent = true
memories = true
external_migration = true
hooks = true
terminal_resize_reflow = true
js_repl = false
rmcp_client = true

` -}}
{{- $managed = setValueAtPath "notify" (list (printf "%s/.codex/computer-use/Codex Computer Use.app/Contents/SharedSupport/SkyComputerUseClient.app/Contents/MacOS/SkyComputerUseClient" .chezmoi.homeDir) "turn-ended") $managed -}}
{{- range $key, $value := $managed -}}{{- $config = setValueAtPath $key $value $config -}}{{- end -}}
{{- toToml $config -}}
