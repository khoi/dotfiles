approval_policy = "never"
forced_login_method = "chatgpt"
model = "gpt-5.3-codex-spark"
model_reasoning_effort = "medium"
model_verbosity = "low"
personality = "pragmatic"
sandbox_mode = "danger-full-access"
service_tier = "fast"

[agents]
max_threads = 8

[features]
default_mode_request_user_input = true
ghost_commit = false
unified_exec = true
skills = true
shell_snapshot = true
steer = true
# responses_websockets_v2 = true
multi_agent = true

[notice]
hide_rate_limit_model_nudge = true

[feedback]
enabled = false

[tui]
status_line = [
  "model-with-reasoning",
  "context-remaining",
  "current-dir",
  "five-hour-limit",
  "weekly-limit"
]

[projects."/Users/khoi/.local/share/chezmoi"]
trust_level = "trusted"
