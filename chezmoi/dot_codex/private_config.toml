approval_policy = "never"
model = "gpt-5.4"
model_reasoning_effort = "xhigh"
model_verbosity = "low"
personality = "pragmatic"
sandbox_mode = "danger-full-access"
plan_mode_reasoning_effort = "xhigh"
notify = [ ]
suppress_unstable_features_warning = true
service_tier = "fast"

[profiles.fast]
model = "gpt-5.4"
model_reasoning_effort = "xhigh"

[profiles.slow]
model = "gpt-5.4"
model_reasoning_effort = "xhigh"

[agents]
max_threads = 8

[features]
apps = false
codex_hooks = true
prevent_idle_sleep = true
default_mode_request_user_input = true
ghost_commit = false
unified_exec = true
skills = true
shell_snapshot = true
steer = true
responses_websockets_v2 = true
multi_agent = true

[notice]
hide_rate_limit_model_nudge = true
hide_full_access_warning = true

[analytics]
enabled = false

[feedback]
enabled = false

[tui]
status_line = [
  "model-with-reasoning",
  "context-usage",
  "current-dir",
  "five-hour-limit",
  "weekly-limit",
  "context-window-size",
  "thread-title"
]
terminal_title = [
  "git-branch",
  "thread",
  "spinner",
  "project",
  "status",
  "task-progress"
]
theme = "zenbones-dark"
