customCommands:
  - key: "<c-s>"
    context: "global"
    command: "codex e --profile fast 'Use $commit but only for staged changes'"
    loadingText: "Generating commit message, rebase and push"
  - key: "<c-u>"
    context: "global"
    command: "git submodule update --force"
    loadingText: "Updating git submodules with force"

git:
  autoFetch: false
  autoRefresh: true

gui:
  spinner:
    frames:
      - "⢿"
      - "⣻"
      - "⣽"
      - "⣾"
      - "⣷"
      - "⣯"
      - "⣟"
      - "⡿"
  # Kanagawa theme
  theme:
    activeBorderColor:
      - "#DCA561"
      - bold
    inactiveBorderColor:
      - "#727169"
    optionsTextColor:
      - "#7aa89f"
    selectedLineBgColor:
      - "#223249"
    cherryPickedCommitBgColor:
      - "#223249"
    cherryPickedCommitFgColor:
      - "#dca561"
    unstagedChangesColor:
      - "#E82424"
    defaultFgColor:
      - "#dcd7ba"
    searchingActiveBorderColor:
      - "#DCA561"
