{{- /* chezmoi:modify-template */ -}}
{{- $config := dict -}}
{{- if .chezmoi.stdin -}}{{- $config = fromToml .chezmoi.stdin -}}{{- end -}}
{{- $managed := fromToml `
min_version = "2026.7.12"

[tools]
"1password-cli" = "latest"
rust = "1.95.0"
go = "latest"
python = "latest"
zig = "0.16.0"
uv = "latest"
"npm:pnpm" = "latest"
"npm:hunkdiff" = "latest"
bun = "latest"
node = "26.1.0"
ruby = "4"
"aqua:tealdeer-rs/tealdeer" = "latest"
"github:MarcoLucidi01/ytcast" = "latest"
"npm:@mariozechner/pi-coding-agent" = "latest"
"npm:@openai/codex" = "latest"
bat = "latest"
chezmoi = "latest"
eza = "0.23.4"
fd = "latest"
fzf = "latest"
gh = "latest"
"git-lfs" = "latest"
jq = "latest"
lazygit = "latest"
neovim = "latest"
ripgrep = "latest"
restic = "latest"
watchexec = "latest"
xcodes = "latest"
yt-dlp = "latest"
zoxide = "latest"
hk = "latest"
gitleaks = "latest"
"npm:agent-browser" = "latest"

[bootstrap.packages]
"brew:aria2" = "latest"
"brew:btop" = "latest"
"brew:ffmpeg" = "latest"
"brew:fish" = "latest"
"brew:git" = "latest"
"brew:glances" = "latest"
"brew:htop" = "latest"
"brew:libyaml" = "latest"
"brew:mosh" = "latest"
"brew:parallel" = "latest"
"brew:pkgconf" = "latest"
"brew:tmux" = "latest"
"brew:yazi" = "latest"
"brew-cask:1password" = "latest"
"brew-cask:adguard" = "latest"
"brew-cask:choosy" = "latest"
"brew-cask:cleanshot" = "latest"
"brew-cask:font-jetbrains-mono-nerd-font" = "latest"
"brew-cask:ghostty" = "latest"
"brew-cask:iina" = "latest"
"brew-cask:orbstack" = "latest"
"brew-cask:raycast" = "latest"
"brew-cask:sf-symbols" = "latest"
"brew-cask:supacode" = "latest"
"brew-cask:telegram" = "latest"

[bootstrap.macos.defaults."com.apple.NetworkBrowser"]
BrowseAllInterfaces = "1"

[bootstrap.macos.defaults."com.apple.desktopservices"]
DSDontWriteNetworkStores = true
DSDontWriteUSBStores = true

[bootstrap.macos.defaults.NSGlobalDomain]
NSAutomaticWindowAnimationsEnabled = false
_HIHideMenuBar = true
NSWindowResizeTime = 0.001
NSNavPanelExpandedStateForSaveMode = true
NSNavPanelExpandedStateForSaveMode2 = true
NSAutomaticCapitalizationEnabled = false
NSAutomaticDashSubstitutionEnabled = false
NSAutomaticPeriodSubstitutionEnabled = false
NSAutomaticQuoteSubstitutionEnabled = false
NSAutomaticSpellingCorrectionEnabled = false
"com.apple.mouse.tapBehavior" = 1
ApplePressAndHoldEnabled = false
KeyRepeat = 1
InitialKeyRepeat = 10
AppleShowAllExtensions = true

[bootstrap.macos.defaults."com.apple.LaunchServices"]
LSQuarantine = false

[bootstrap.macos.defaults."com.apple.driver.AppleBluetoothMultitouch.trackpad"]
Clicking = true

[bootstrap.macos.defaults."com.apple.universalaccess"]
mouseDriverCursorSize = 2.0

[bootstrap.macos.defaults."com.apple.screensaver"]
askForPassword = 1
askForPasswordDelay = 0

[bootstrap.macos.defaults."com.apple.finder"]
QuitMenuItem = true
DisableAllAnimations = true
ShowExternalHardDrivesOnDesktop = true
ShowHardDrivesOnDesktop = true
ShowMountedServersOnDesktop = true
ShowRemovableMediaOnDesktop = true
ShowStatusBar = true
ShowPathbar = true
_FXShowPosixPathInTitle = true
_FXSortFoldersFirst = true
FXDefaultSearchScope = "SCcf"
FXEnableExtensionChangeWarning = false
OpenWindowForNewRemovableDisk = true
FXPreferredViewStyle = "Nlsv"
WarnOnEmptyTrash = false

[bootstrap.macos.defaults."com.apple.frameworks.diskimages"]
"skip-verify" = true
"skip-verify-locked" = true
"skip-verify-remote" = true
"auto-open-ro-root" = true
"auto-open-rw-root" = true

[bootstrap.macos.defaults."com.apple.dock"]
"static-only" = true
"expose-animation-duration" = 0.1
"autohide-delay" = 0.0
"autohide-time-modifier" = 0.0
autohide = true
"show-recents" = false
"no-bouncing" = true

[bootstrap.macos.defaults."com.apple.ActivityMonitor"]
OpenMainWindow = true
ShowCategory = 0
SortColumn = "CPUUsage"
SortDirection = 0

[bootstrap.macos.defaults."com.apple.DiskUtility"]
DUDebugMenuEnabled = true
"advanced-image-options" = true

[bootstrap.macos.defaults."com.apple.QuickTimePlayerX"]
MGPlayMovieOnOpen = true

[bootstrap.user]
login_shell = "/opt/homebrew/bin/fish"

[settings]
minimum_release_age = "3d"
minimum_release_age_excludes = ["npm:@openai/codex"]
lockfile_platforms = ["macos-arm64"]
ruby.compile = false
` -}}
{{- $config = mergeOverwrite $config $managed -}}
{{- toToml $config -}}
